kind = "web"
previewPath = "/"
title = "Dev Dashboard"
version = "1.0.0"
id = "artifacts/dev-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20934

[services.development]
run = "pnpm --filter @workspace/dev-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dev-dashboard", "run", "build" ]
publicDir = "artifacts/dev-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20934"
BASE_PATH = "/"
